# Builds the PenTrack frontend image (nginx + React bundle) and pushes it to
# Docker Hub on tag push. Mirrors build-backend.yml.
#
# Requires a REGISTRY_TOKEN secret (Docker Hub access token, read/write) and
# the username set below.
name: build-and-push-frontend
on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: docker.io
  IMAGE: tonybooom/pen-test-tracker-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: catthehacker/ubuntu:act-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: tonybooom
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
