services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pentrack
      POSTGRES_PASSWORD: pentrack
      POSTGRES_DB: pentrack
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pentrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://pentrack:pentrack@db:5432/pentrack
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-changeme}
      ATTACHMENTS_DIR: /data/attachments
    volumes:
      - attachments:/data/attachments
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  attachments:
