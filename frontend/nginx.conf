server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets with long cache (filenames are content-hashed by Vite)
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API + file downloads -> backend. The backend serves routes at the root
    # (e.g. /findings, /auth/login), so strip the /api prefix here.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow large PDF report uploads
        client_max_body_size 50m;
    }

    # SPA fallback — any non-asset, non-api path returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
