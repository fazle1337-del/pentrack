server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (issue #8). `always` so they're sent on error responses
    # too. CSP: everything is same-origin (JS/CSS under /assets, API under /api);
    # 'unsafe-inline' for styles is required because the React app sets inline
    # style attributes. HSTS is intentionally NOT set here — it belongs at the
    # external HTTPS proxy that terminates TLS, not this internal :8080 server.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # Static assets with long cache (filenames are content-hashed by Vite).
    # nginx add_header in a location block drops inherited headers, so the
    # security headers above are re-declared here.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    }

    # API + file downloads -> backend. The backend serves routes at the root
    # (e.g. /findings, /auth/login), so strip the /api prefix here.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow large PDF report uploads
        client_max_body_size 50m;
    }

    # SPA fallback — any non-asset, non-api path returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
